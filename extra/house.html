<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8">
    <meta name="keywords" content="home, house, layout">
    <meta name="description" content="house layout wowza">
    <meta name="author" content="Siiri">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="../images/favicon.png">
    <title>House Layout</title>
    <link rel="stylesheet" href="../css/house.css">
</head>

<body>

<main>
<!-- tr = table ROW
     th = table header
     td = table column -->

<table>
    <!-- First Row -->
  <tr>
    <th style="width: 250px; border-style: none solid none none;" 
    class="a"></th>

    <th style="width: 50px;" 
    class="b"></th>

    <th style="width: 50px;" 
    class="b"></th>

    <th style="width: 150px; border-style: none none solid solid;" 
    class="a"></th>
  </tr>

    <!-- Second Row -->
  <tr>
    <td style="border-style: none solid none none;" 
    class="a"></td>

    <td class="b"></td>
    <td class="b"></td>

    <td style="border-style: none solid none none;" 
    class="c"></td>
  </tr>

    <!-- Third Row -->
  <tr>
    <td style="border-style: none solid none none;" class="a"></td>

    <td class="b"></td>
    <td class="b"></td>

    <td style="border-style: none solid none solid;" 
    class="c"></td>
  </tr>

    <!-- Fourth Row -->
  <tr>
    <td style="border-style: none solid none none;" 
    class="a"></td>

    <td class="b"></td>
    <td class="b"></td>

    <td style="border-style: none solid solid solid;" 
    class="c"></td>
  </tr>

    <!-- Fifth Row -->
  <tr>
    <td style="border-style: none solid solid none;" 
    class="a"></td>

    <td class="b"></td>
    <td class="b"></td>

    <td style="border-style: none solid none solid;" 
    class="d"></td>
  </tr>

    <!-- Sixth Row -->
  <tr>
    <td style="border-style: none none none solid;" 
    class="e"></td>

    <td class="b"></td>
    <td class="b"></td>

    <td style="border-style: none solid solid none;" 
    class="d"></td>
  </tr>

    <!-- Seventh Row -->
  <tr>
    <td style="border-style: none solid none none;"  
    class="e"></td>

    <td style="border-style: solid none none none;" 
    class="f"></td>
    <td class="f"></td>
    <td style="border-style: none solid none none;" 
    class="f"></td>
  </tr>

    <!-- Eighth Row -->
  <tr>
    <td style="border-style: none solid none solid;" 
    class="e"></td>

    <td class="f"></td>
    <td class="f"></td>
    <td style="border-style: none solid none none;" class="f"></td>
  </tr>

    <!-- Nineth Row -->
  <tr>
    <td style="border-style: none solid none solid;" 
    class="e"></td>

    <td class="f"></td>
    <td class="f"></td>
    <td style="border-style: none solid none none;" class="f"></td>
  </tr>

    <!-- Tenth Row -->
  <tr>
    <td style="border-style: none solid solid solid;" 
    class="e"></td>

    <td style="border-style: none none solid none;" 
    class="f"></td>
    <td style="border-style: none none solid none;" 
    class="f"></td>
    <td style="border-style: none solid solid none;" 
    class="f"></td>
  </tr>

</table>
</main>
</body>

</html>
